<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page_title"></title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Amiri (Titles) & Noto Kufi (Body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Noto+Kufi+Arabic:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <style>
        /* --- General Theme & Typography --- */
        :root {
            --color-gold: #d4af37;
            --color-gold-light: #f3e5ab;
            --color-slate-dark: #1e293b;
            --color-paper: #fdfbf7;
        }

        body {
            font-family: 'Noto Kufi Arabic', sans-serif;
            background-color: var(--color-paper);
            color: #333;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 24px 24px;
        }

        h1,
        h2,
        h3,
        .serif-font {
            font-family: 'Amiri', serif;
        }

        /* --- Animations --- */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* --- Epoch Colors (Subtle & Professional) --- */
        .epoch-1-border {
            border-color: #8D6E63;
        }

        /* Yemen - Brown */
        .epoch-2-border {
            border-color: #4CAF50;
        }

        /* Prophet - Green */
        .epoch-3-border {
            border-color: #C62828;
        }

        /* Andalus - Red */
        .epoch-4-border {
            border-color: #7E57C2;
        }

        /* Migration - Purple */
        .epoch-5-border {
            border-color: #1976D2;
        }

        /* Libya - Blue */

        .epoch-1-text {
            color: #5D4037;
        }

        .epoch-2-text {
            color: #2E7D32;
        }

        .epoch-3-text {
            color: #C62828;
        }

        .epoch-4-text {
            color: #512DA8;
        }

        .epoch-5-text {
            color: #0D47A1;
        }

        .badge-verified {
            background-color: #ecfdf5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .badge-historical {
            background-color: #f8fafc;
            color: #475569;
            border: 1px solid #e2e8f0;
        }

        /* --- Timeline Specifics --- */
        .timeline-line {
            position: absolute;
            right: 23px;
            /* Align with dots */
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, #cbd5e1 0%, #cbd5e1 100%);
            z-index: 0;
        }

        /* --- Tab System --- */
        .nav-btn {
            position: relative;
            transition: all 0.3s ease;
        }

        .nav-btn::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            width: 0;
            height: 2px;
            background-color: var(--color-gold);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav-btn.active {
            color: var(--color-slate-dark);
            font-weight: 700;
        }

        .nav-btn.active::after {
            width: 80%;
        }

        .nav-btn:hover {
            color: var(--color-gold);
        }

        /* --- Family Branches under Fadl (52+) --- */
        .tree-section-title {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 20px;
            background: #1e293b;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 1rem;
        }

        .tree-root {
            text-align: center;
            margin: 24px 0;
            position: relative;
        }

        .tree-root::before {
            content: '';
            position: absolute;
            top: -24px;
            left: 50%;
            height: 20px;
            width: 3px;
            background: #cbd5e1;
            transform: translateX(-50%);
        }

        .fadl-node {
            background: #16a34a;
            color: white;
            padding: 12px 24px;
            border-radius: 999px;
            display: inline-block;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 6px 18px rgba(22, 163, 74, 0.35);
            border: 2px solid #15803d;
        }

        .branches-wrapper {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 3px solid #e2e8f0;
            position: relative;
            padding-bottom: 20px;
        }

        .branches-wrapper::before {
            content: '';
            position: absolute;
            top: -18px;
            left: 50%;
            height: 18px;
            width: 3px;
            background: #e2e8f0;
            transform: translateX(-50%);
        }

        .branch-card {
            flex: 1;
            min-width: 260px;
            max-width: 320px;
            background: #ffffff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
            border-top: 5px solid #cbd5e1;
            border-inline-start: 1px solid #e2e8f0;
        }

        .branch-header {
            padding: 12px 14px;
            text-align: center;
            font-weight: 700;
            color: #f9fafb;
            font-size: 0.95rem;
        }

        .branch-body {
            padding: 12px 14px 14px 14px;
            font-size: 0.9rem;
        }

        .sub-group {
            margin-bottom: 10px;
            border-bottom: 1px dashed #e5e7eb;
            padding-bottom: 6px;
        }

        .sub-group:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .sub-group h4 {
            margin: 0 0 4px 0;
            color: #0f172a;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .sub-group ul {
            margin: 0;
            padding-right: 18px;
            color: #4b5563;
        }

        .sub-group li {
            margin-bottom: 3px;
        }

        /* --- Book Cover Mockup --- */
        .book-spine {
            background: linear-gradient(90deg, #2c3e50 0%, #34495e 10%, #2c3e50 15%, #2c3e50 100%);
            box-shadow: inset 2px 0 5px rgba(255, 255, 255, 0.1), 5px 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* --- 1. LOADING CURTAIN (Professional Transition) --- */
        #lang-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f172a;
            z-index: 100000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
        }

        #lang-loader.visible {
            opacity: 1;
            visibility: visible;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #fbbf24;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        .loading-text {
            color: #fbbf24;
            font-family: serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* --- 2. FLOATING BUTTON (UPDATED) --- */
        .floating-lang-wrapper {
            position: fixed;
            bottom: 30px;
            left: 25px;
            z-index: 99999;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            gap: 12px;
        }

        .lang-toggle-btn {
            width: 56px;
            height: 56px;
            background: #0f172a;
            border: 2px solid #fbbf24;
            border-radius: 50%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: transform 0.2s ease;
        }

        .lang-toggle-btn:active {
            transform: scale(0.9);
        }

        .lang-menu {
            background: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            gap: 5px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px) scale(0.9);
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 5px;
        }

        .floating-lang-wrapper.active .lang-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .lang-option {
            background: transparent;
            border: none;
            padding: 10px 16px;
            width: 100%;
            text-align: left;
            cursor: pointer;
            font-weight: 600;
            color: #334155;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            white-space: nowrap;
        }

        .lang-option:hover {
            background: #f1f5f9;
            color: #0f172a;
        }
    </style>
</head>

<body class="flex flex-col min-h-screen">

    <!-- === HERO HEADER === -->

        <div class="absolute inset-0 opacity-10"

        </div>

        <div class="container mx-auto px-4 py-8 relative z-10">

            </div>

    </header>

    <!-- === MAIN CONTENT === -->
    <main class="container mx-auto px-4 py-8 flex-grow max-w-5xl">

        <!-- ================= TAB 1: TREE ================= -->
        <div id="view-tree" class="animate-fade-up">

            <!-- Controls Toolbar -->

                    <!-- Search -->
                    <div class="relative w-full md:w-1/3">

                    </div>

                    <!-- Filter Buttons -->
                    <div class="flex overflow-x-auto gap-2 w-full md:w-auto no-scrollbar pb-1">

                        <button onclick="filterEpoch('epoch-2')" data-i18n="filter_prophet"

                        <button onclick="filterEpoch('epoch-3')" data-i18n="filter_andalus"
                            class="filter-btn px-4 py-1.5 rounded-full bg-white border border-[#C62828] text-[#C62828] text-xs hover:bg-[#C62828] hover:text-white transition-all"></button>
                        <button onclick="filterEpoch('epoch-4')" data-i18n="filter_migration"
                            class="filter-btn px-4 py-1.5 rounded-full bg-white border border-[#7E57C2] text-[#512DA8] text-xs hover:bg-[#7E57C2] hover:text-white transition-all"></button>
                        <button onclick="filterEpoch('epoch-5')" data-i18n="filter_libya"

            </div>

                <div id="timelineContainer" class="space-y-4">

                </div>

                    <div class="branch-body" data-i18n="branch_2_desc"></div>

                <!-- Card 2 -->
                <div
                    class="bg-white rounded-xl p-6 shadow hover:shadow-md transition border border-slate-100 relative overflow-hidden group">
                    <div class="absolute top-0 left-0 w-2 h-full bg-emerald-500"></div>
                    <div class="flex justify-between items-start">
                        <div>
                            <span
                                class="text-xs font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded mb-2 inline-block"

                            <h4 class="text-xl font-bold text-slate-800 serif-font group-hover:text-emerald-700 transition"

                            <p class="text-sm text-slate-500 mt-2" data-i18n="fig_2_desc"></p>

                <!-- Card 3 -->
                <div
                    class="bg-white rounded-xl p-6 shadow hover:shadow-md transition border border-slate-100 relative overflow-hidden group">
                    <div class="absolute top-0 left-0 w-2 h-full bg-amber-500"></div>
                    <div class="flex justify-between items-start">
                        <div>
                            <span
                                class="text-xs font-bold text-amber-600 bg-amber-50 px-2 py-1 rounded mb-2 inline-block"
                                data-i18n="fig_3_badge"></span>
                            <h4 class="text-xl font-bold text-slate-800 serif-font group-hover:text-amber-700 transition"
                                data-i18n="fig_3_name"></h4>
                            <p class="text-sm text-slate-500 mt-2" data-i18n="fig_3_desc"></p>
                        </div>
                        <div class="text-3xl opacity-20 group-hover:opacity-100 transition">📜</div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-slate-50 flex items-center gap-2 text-xs text-slate-400">
                        <span data-i18n="fig_3_loc"></span>
                    </div>
                </div>

                <!-- Card 4 -->
                <div
                    class="bg-white rounded-xl p-6 shadow hover:shadow-md transition border border-slate-100 relative overflow-hidden group">
                    <div class="absolute top-0 left-0 w-2 h-full bg-amber-500"></div>
                    <div class="flex justify-between items-start">
                        <div>
                            <span
                                class="text-xs font-bold text-amber-600 bg-amber-50 px-2 py-1 rounded mb-2 inline-block"
                                data-i18n="fig_4_badge"></span>
                            <h4 class="text-xl font-bold text-slate-800 serif-font group-hover:text-amber-700 transition"
                                data-i18n="fig_4_name"></h4>
                            <p class="text-sm text-slate-500 mt-2" data-i18n="fig_4_desc"></p>
                        </div>
                        <div class="text-3xl opacity-20 group-hover:opacity-100 transition">🌴</div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-slate-50 flex items-center gap-2 text-xs text-slate-400">
                        <span data-i18n="fig_4_loc"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ================= TAB 3: LIBRARY ================= -->
        <div id="view-library" class="hidden animate-fade-up">

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Book Display -->
                <div class="lg:col-span-1 flex flex-col items-center">
                    <div class="w-48 h-72 mb-6">
                        <img src="ansar-wadi-al-shati.jpg" alt="" data-i18n-alt="library_book_alt"
                            class="w-full h-full object-cover rounded-lg shadow-md hover:scale-105 transition duration-500">
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-slate-200 text-right w-full">
                        <span class="block text-xs text-slate-500 mb-1" data-i18n="library_doc_label"></span>
                        <span class="block font-bold text-slate-800" data-i18n="lib_book_info"></span>
                        <span class="block text-sm text-slate-600 mt-2" data-i18n="library_author"></span>
                    </div>
                </div>

                <!-- Methodology Content -->
                <div class="lg:col-span-2 space-y-6">
                    <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-100">
                        <h2 class="text-2xl font-bold text-slate-800 mb-6 serif-font flex items-center gap-3"
                            data-i18n="library_methodology_title">
                            <span class="text-amber-500">❖</span>
                        </h2>

                        <div class="prose prose-sm max-w-none text-slate-600 leading-8">
                            <p class="mb-4" data-i18n="lib_method_text"></p>
                            <ul class="list-disc list-inside space-y-2 marker:text-amber-500">
                                <li data-i18n="lib_point_1"></li>
                                <li data-i18n="lib_point_2"></li>
                                <li data-i18n="lib_point_3"></li>
                            </ul>
                        </div>
                    </div>

                    <div class="bg-slate-50 p-6 rounded-xl border border-slate-200">
                        <h3 class="font-bold text-slate-800 mb-3 text-sm" data-i18n="library_sources_title"></h3>
                        <ul class="text-xs text-slate-600 space-y-2">
                            <li data-i18n="library_source_1"></li>
                            <li data-i18n="library_source_2"></li>
                            <li data-i18n="library_source_3"></li>
                            <li data-i18n="library_source_4"></li>
                        </ul>
                    </div>

                    <div class="bg-emerald-50 border border-emerald-200 p-6 rounded-xl flex items-start gap-4">
                        <div class="text-3xl">🛡️</div>
                        <div>
                            <h4 class="font-bold text-emerald-900 mb-1" data-i18n="lib_logic_title"></h4>
                            <p class="text-sm text-emerald-800/80 leading-relaxed" data-i18n="lib_logic_text"></p>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- ================= TAB 4: AUTHOR ================= -->
        <div id="view-author" class="hidden animate-fade-up">
            <div class="space-y-8">

                <!-- Header Card -->
                <div
                    class="bg-gradient-to-r from-slate-900 to-slate-800 text-white p-8 rounded-xl shadow-lg border border-slate-700">
                    <h2 class="text-3xl md:text-4xl font-bold serif-font mb-4" data-i18n="author_channel_title"></h2>
                    <p class="text-slate-100 leading-8 text-lg" data-i18n="author_bio"></p>
                </div>

                <!-- YouTube Embed -->
                <div class="flex flex-col items-center">
                    <h3 class="text-2xl font-bold mb-6 text-slate-800 serif-font" data-i18n="author_playlist_title">
                    </h3>
                    <div class="w-full aspect-video rounded-xl overflow-hidden shadow-lg border border-slate-200">
                        <iframe width="100%" height="100%"
                            src="https://www.youtube.com/embed/videoseries?list=PLx2j-W6hDiG6a9AAPBQgCRjG_t1Ge--dl"
                            title="" data-i18n-title="author_youtube_title" frameborder="0"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                            allowfullscreen></iframe>
                    </div>
                </div>

                <!-- Books Section -->
                <div class="bg-white p-8 rounded-xl shadow-md border border-slate-100">
                    <h3 class="text-2xl font-bold mb-6 text-slate-800 serif-font" data-i18n="author_books_title">
                    </h3>
                    <p class="text-slate-700 leading-8 mb-6" data-i18n="author_books_intro"></p>
                    <div class="space-y-4 mb-6 text-slate-700 leading-8">
                        <p data-i18n="author_book_1"></p>
                        <p data-i18n="author_book_2"></p>
                    </div>
                    <div class="flex flex-col sm:flex-row gap-4">
                        <a href="https://www.andrewtips.com" target="_blank" rel="noopener noreferrer"
                            class="px-6 py-3 bg-slate-900 text-white rounded-lg font-bold hover:bg-slate-800 transition text-center"
                            data-i18n="btn_visit_books">
                        </a>
                        <a href="https://www.youtube.com/@AndrewTipsOfficial" target="_blank" rel="noopener noreferrer"
                            class="px-6 py-3 bg-white border-2 border-slate-900 text-slate-900 rounded-lg font-bold hover:bg-slate-50 transition text-center"
                            data-i18n="btn_visit_youtube">
                        </a>
                    </div>
                </div>

            </div>
        </div>

    </main>

    <!-- === FOOTER === -->
    <footer class="bg-slate-900 text-slate-400 py-8 text-center text-xs mt-auto">
        <p data-i18n="footer_rights"></p>
    </footer>

    <!-- === MODAL === -->
    <div id="detailModal" class="fixed inset-0 z-50 hidden flex items-start md:items-center justify-center p-4 md:p-6">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm transition-opacity opacity-0" id="modalBackdrop">
        </div>

        <!-- Content -->
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] relative z-10 transform scale-95 opacity-0 transition-all duration-300 overflow-hidden"
            id="modalContent">
            <!-- Header -->
            <div id="modalHeader"
                class="p-6 text-white rounded-t-2xl flex justify-between items-start relative overflow-hidden">
                <div class="absolute inset-0 opacity-10 bg-white"
                    style="background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPjxyZWN0IHdpZHRoPSI0IiBoZWlnaHQ9IjQiIGZpbGw9IiNmZmYiLz48L3N2Zz4=');">
                </div>
                <div class="relative z-10">
                    <span id="modalEpoch"
                        class="text-[10px] uppercase tracking-widest font-bold opacity-80 mb-2 block border border-white/30 rounded-full px-2 py-0.5 w-fit"
                        data-i18n="modal_epoch_label"></span>
                    <h3 id="modalName" class="text-3xl font-bold serif-font leading-tight" data-i18n="modal_name_label">
                    </h3>
                    <div class="flex items-center gap-2 mt-2 text-white/90">
                        <span class="text-sm">📅</span>
                        <span id="modalDate" class="text-sm font-mono" data-i18n="modal_date_label"></span>
                    </div>
                </div>
                <button id="modalCloseButton" onclick="closeModal()"
                    class="relative z-10 text-white/70 hover:text-white transition bg-black/20 hover:bg-black/30 rounded-full p-2 h-9 w-9 flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <!-- Body -->
            <div class="p-6 md:p-8 overflow-y-auto max-h-[65vh] md:max-h-[70vh] space-y-6">
                <!-- Story Section -->
                <div>
                    <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wide mb-3 flex items-center gap-2"
                        data-i18n="modal_story_label">
                        <span class="w-4 h-px bg-slate-300"></span>
                    </h4>
                    <p id="modalStory"
                        class="text-slate-700 leading-loose text-lg font-medium border-l-4 border-slate-100 pl-4"></p>
                </div>

                <!-- Details Grid -->
                <div class="grid grid-cols-1 gap-4 text-sm">
                    <div class="flex items-start gap-3 p-3 rounded-lg bg-slate-50 border border-slate-100">
                        <span class="text-xl">📚</span>
                        <div>
                            <strong class="block text-slate-800 mb-1" data-i18n="modal_source_label"></strong>
                            <span id="modalSource" class="text-slate-600 block"></span>
                        </div>
                    </div>
                    <div class="flex items-start gap-3 p-3 rounded-lg bg-amber-50 border border-amber-100">
                        <span class="text-xl">💡</span>
                        <div>
                            <strong class="block text-amber-900 mb-1" data-i18n="modal_logic_label"></strong>
                            <span id="modalLogic" class="text-amber-800 block"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="lang-loader">
        <div class="spinner"></div>
        <div class="loading-text" data-i18n="lang_loading"></div>
    </div>

    <div class="floating-lang-wrapper" id="langFab">
        <div class="lang-menu">
            <button class="lang-option" data-lang="ar"><span>🇸🇦</span> العربية</button>
            <button class="lang-option" data-lang="en"><span>🇺🇸</span> English</button>
            <button class="lang-option" data-lang="tr"><span>🇹🇷</span> Türkçe</button>
            <button class="lang-option" data-lang="pl"><span>🇵🇱</span> Polski</button>
        </div>
        <div class="lang-toggle-btn" onclick="toggleLangMenu()">
            🌍
        </div>
    </div>

    <script id="family-tree-data" src="data/data_ar.js"></script>
    <script src="main.js"></script>
</body>

</html>
